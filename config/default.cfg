# CppNCorr default configuration
# ------------------------------------------------------------------------------
# Format: INI (key = value). Chosen over TOML to avoid any third-party
# dependency; parsed by the in-tree header-only parser include/ncorr/ini.h.
#
# Override precedence (highest wins):
#   1. Direct CLI arguments
#   2. This config file
#   3. Compiled defaults (include/ncorr/config.h :: struct Config)
#
# Every key below matches a field of ncorr::Config EXACTLY (case-sensitive) so
# there are no silent mismatches. Comments use '#' (or ';'); inline comments are
# supported. The values shown here mirror the compiled defaults.

# --- Pyramid / search ---------------------------------------------------------
scalefactor = 3                          # pyramid downsampling level for seed search

# --- Subregion (correlation window) ------------------------------------------
subregion_type = CIRCLE                  # CIRCLE or SQUARE
subregion_radius = 20                    # correlation window radius (pixels)

# --- Interpolation ------------------------------------------------------------
# One of: NEAREST, LINEAR, CUBIC_KEYS, CUBIC_KEYS_PRECOMPUTE,
#         QUINTIC_BSPLINE, QUINTIC_BSPLINE_PRECOMPUTE
interp_type = QUINTIC_BSPLINE_PRECOMPUTE

# --- Strain -------------------------------------------------------------------
strain_subregion_type = CIRCLE           # CIRCLE or SQUARE
strain_radius = 5                        # strain window radius (pixels)

# --- DIC behaviour ------------------------------------------------------------
dic_config = NO_UPDATE                   # NO_UPDATE, KEEP_MOST_POINTS, REMOVE_BAD_POINTS
num_threads = 4                          # worker threads for parallel analysis
debug = false                            # verbose engine output

# --- Perspective / units ------------------------------------------------------
perspective_interp = CUBIC_KEYS          # interpolation used by perspective change
units = mm                               # displacement units label
units_per_pixel = 0.2                    # physical scaling

# --- Output / video -----------------------------------------------------------
alpha = 0.5                              # video overlay alpha (0..1)
fps = 15.0                              # output video frames per second
