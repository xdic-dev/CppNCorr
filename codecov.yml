# Codecov configuration for CppNCorr
# https://docs.codecov.com/docs/codecovyml-reference
codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "build/**"
  - "test/**"
  - "tests/**"
