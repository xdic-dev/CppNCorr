# Categorisation of pull requests in auto-generated release notes for CppNCorr.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI / Build / Tooling
      labels:
        - ci
        - build
        - chore
    - title: Other Changes
      labels:
        - "*"
